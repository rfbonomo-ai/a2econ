<script>
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const W=490, H=490, M=62, PLOT=W-M-22;

const GOLD='#C9A84C', GOLDL='#E2C270', TEAL='#4ecdc4', GREEN='#6dbf6d', PURPLE='#b07fd4', RED='#ff6b6b';

const cx = x => M + (x/11)*PLOT;
const cy = y => (H-M) - (y/11)*PLOT;
const ease = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;

// ═══════════════════════════════════════════════════════════
// EXACT VERIFIED GEOMETRY — GIFFEN GOOD PRICE RISE
//
// Price of X RISES: Px1=1 → Px2=2
//
// B1: x+y=10    (0,10)→(10,0)  slope=-1  FLAT  (original)
// B2: 2x+y=10   (0,10)→(5,0)   slope=-2  STEEP (after rise)
//
// IC1 = y = 49/(x+4)   shifted hyperbola
//   Tangent to B1 at E1=(3,7): slope=-49/49=-1 ✓   HIGH on B1 ✓
//   Tangent to comp at E2=(0.950,9.899): slope=-2 ✓
//
// Comp: y = -2x + 11.799   clipped (2.071,10)→(5.899,0)  slope=-2 ‖ B2 ✓
//
// IC2 = y = 2/(x−3)   shifted hyperbola
//   Tangent to B2 at E3=(4,2): slope=-2/(4-3)²=-2 ✓
//   IC2 < IC1 (lower utility — price rose, consumer poorer) ✓
//
// GIFFEN ORDER: E2.x(0.95) < E1.x(3) < E3.x(4) ✓
//   SE: E1→E2 moves LEFT  (X dearer → substitute away)
//   IE: E2→E3 moves RIGHT so strongly it OVERSHOOTS past E1
//   Net: X demand RISES despite price rise → upward-sloping demand! ✓
// ═══════════════════════════════════════════════════════════

const E1 = {x: 3,                   y: 7                   };
const E2 = {x: Math.sqrt(24.5)-4,   y: 49/Math.sqrt(24.5)  }; // ≈(0.950, 9.899)
const E3 = {x: 4,                   y: 2                   };

const COMP_YINT  = E2.y + 2*E2.x;          // ≈ 11.799
const COMP_XSTART = (COMP_YINT - 10) / 2;  // ≈ 0.900 (clip at y=10)
const COMP_XEND   = COMP_YINT / 2;         // ≈ 5.899

let step=0, aid=null;
let D={bl:false,ic1:false,e1:false,comp:false,se:false,tug:false,ie:false,total:false};

// ── AXES ─────────────────────────────────────────────────
function axes(){
  ctx.strokeStyle='#111'; ctx.lineWidth=0.5;
  for(let i=1;i<=10;i++){
    ctx.beginPath(); ctx.moveTo(cx(i),H-M); ctx.lineTo(cx(i),M-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(M,cy(i)); ctx.lineTo(W-18,cy(i)); ctx.stroke();
  }
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(M,H-M); ctx.lineTo(W-14,H-M); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(M,H-M); ctx.lineTo(M,14); ctx.stroke();
  ctx.fillStyle='#2a2a2a';
  [[W-14,H-M,W-20,H-M-4,W-20,H-M+4],[M,14,M-4,20,M+4,20]].forEach(([ax,ay,bx,by,ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(ex,ey); ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle='#444'; ctx.font='13px DM Sans'; ctx.textAlign='center';
  ctx.fillText('Good X', W/2+10, H-8);
  ctx.save(); ctx.translate(13,H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Good Y',0,0); ctx.restore();
  ctx.fillStyle='#333'; ctx.font='11px Space Mono'; ctx.textAlign='right';
  ctx.fillText('O',M-6,H-M+14);
}

// ── STRAIGHT SEGMENT (animated) ──────────────────────────
function seg(x0,y0,x1,y1,col,dash,w,p){
  const ex=x0+(x1-x0)*p, ey=y0+(y1-y0)*p;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash(dash);
  ctx.beginPath(); ctx.moveTo(cx(x0),cy(y0)); ctx.lineTo(cx(ex),cy(ey)); ctx.stroke();
  ctx.setLineDash([]);
}

// ── SHIFTED HYPERBOLA y=k/(x+c), c>0 means shift left ───
function drawShiftedPos(k, c, xStart, xEnd, col, w, p){
  const drawX = xStart+(xEnd-xStart)*p;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash([]);
  ctx.beginPath();
  let first=true;
  for(let i=0;i<=150;i++){
    const x=xStart+(drawX-xStart)*i/150;
    const y=k/(x+c);
    if(y<0.05||y>10.5) continue;
    first?ctx.moveTo(cx(x),cy(y)):ctx.lineTo(cx(x),cy(y));
    first=false;
  }
  ctx.stroke();
}

// ── SHIFTED HYPERBOLA y=k/(x-c), asymptote at x=c ───────
function drawShiftedNeg(k, c, xStart, xEnd, col, w, p){
  const drawX = xStart+(xEnd-xStart)*p;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash([]);
  ctx.beginPath();
  let first=true;
  for(let i=0;i<=150;i++){
    const x=xStart+(drawX-xStart)*i/150;
    if(x<=c+0.05) continue;
    const y=k/(x-c);
    if(y<0.05||y>10.5) continue;
    first?ctx.moveTo(cx(x),cy(y)):ctx.lineTo(cx(x),cy(y));
    first=false;
  }
  ctx.stroke();
}

// ── BUDGET LINES ─────────────────────────────────────────
function bl(p=1){
  seg(0,10,10,0, TEAL,[],2.5, p);                       // B1 flat slope -1
  if(p>=0.5) seg(0,10,5,0, GOLD,[],2.5, (p-.5)/.5);    // B2 steep slope -2
  if(p===1){
    ctx.font='bold 13px Space Mono'; ctx.textAlign='left';
    ctx.fillStyle=TEAL; ctx.fillText('B₁', cx(10)+5, cy(0)+4);
    ctx.fillStyle=GOLD; ctx.fillText('B₂', cx(5)+5,  cy(0)+4);
    ctx.fillStyle='#253535'; ctx.font='10px DM Sans';
    ctx.fillText('slope −1', cx(7.5), cy(2.8)-10);
    ctx.fillStyle='#3a2e00';
    ctx.fillText('slope −2', cx(1.0), cy(8)+16);
    ctx.fillStyle='#222'; ctx.textAlign='left';
    ctx.fillText('← same Y-intercept', cx(0)+8, cy(10)-10);
  }
}

// ── DROP LINES ────────────────────────────────────────────
function drop(x,y){
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(cx(x),cy(y)); ctx.lineTo(cx(x),cy(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx(x),cy(y)); ctx.lineTo(cx(0),cy(y)); ctx.stroke();
  ctx.setLineDash([]);
}

// ── POINT ─────────────────────────────────────────────────
function pt(x,y,col,lbl,pos){
  ctx.beginPath(); ctx.arc(cx(x),cy(y),5.5,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 13px Space Mono';
  const o=11;
  const P={tr:[o,-o+4,'left'],tl:[-o,-o+4,'right'],br:[o,o+12,'left'],bl:[-o,o+12,'right']};
  const [dx,dy,ta]=P[pos||'tr'];
  ctx.textAlign=ta; ctx.fillText(lbl,cx(x)+dx,cy(y)+dy);
}

// ── COMPENSATED LINE ──────────────────────────────────────
// slope=-2, parallel to B2, clipped at canvas top
function comp(p=1){
  seg(COMP_XSTART,10, COMP_XEND,0, GOLDL,[7,4],1.8, p);
  if(p===1){
    ctx.fillStyle=GOLDL; ctx.font='10px DM Sans'; ctx.textAlign='left';
    ctx.fillText('compensated (slope −2)', cx(3.2), cy(3.8)+14);
  }
}

// ── ARROW ─────────────────────────────────────────────────
function arrow(x1,y1,x2,y2,col,lbl,ox,oy){
  const ang=Math.atan2(cy(y2)-cy(y1), cx(x2)-cx(x1));
  ctx.strokeStyle=col; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(cx(x1),cy(y1)); ctx.lineTo(cx(x2),cy(y2)); ctx.stroke();
  ctx.save(); ctx.translate(cx(x2),cy(y2)); ctx.rotate(ang);
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-11,-5); ctx.lineTo(-11,5); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.fillStyle=col; ctx.font='bold 11px DM Sans'; ctx.textAlign='center';
  ctx.fillText(lbl, (cx(x1)+cx(x2))/2+(ox||0), (cy(y1)+cy(y2))/2+(oy||0));
}

// ── RENDER ────────────────────────────────────────────────
function render(at, ap){
  ctx.clearRect(0,0,W,H);
  axes();

  if(D.bl||at==='bl') bl(D.bl?1:ap);

  // IC1 = 49/(x+4) — smooth shifted hyperbola
  if(D.ic1||at==='ic1'){
    drawShiftedPos(49, 4, 0.5, 10, TEAL, 2.5, D.ic1?1:ap);
    if(D.ic1){
      ctx.fillStyle=TEAL; ctx.font='bold 12px Space Mono'; ctx.textAlign='left';
      ctx.fillText('I₁', cx(9.2), cy(49/13.2)-4);
    }
  }

  // E1 — HIGH on B1 (upper left, small x large y)
  if(D.e1||D.comp||D.se||D.tug||D.ie||D.total){
    drop(E1.x,E1.y); pt(E1.x,E1.y,TEAL,'E₁','tr');
  }

  // Comp — slope -2, parallel to B2
  if(D.comp||D.se||D.tug||D.ie||D.total) comp(1);
  else if(at==='comp') comp(ap);

  // E2 — upper left, SE overshoots left
  if(D.comp||D.se||D.tug||D.ie||D.total){
    drop(E2.x,E2.y); pt(E2.x,E2.y,GOLDL,'E₂','tr');
  }

  // SE arrow E1→E2 (leftward)
  if(D.se||D.tug||D.ie||D.total)
    arrow(E1.x,E1.y, E2.x,E2.y, GREEN,'SE', 0,-16);

  // Tug of war — IE about to dominate
  if(D.tug||D.ie||D.total){
    ctx.save();
    const yBracket = cy(Math.min(E2.y,E3.y)) + 40;
    ctx.strokeStyle='#5a0000'; ctx.lineWidth=1.5; ctx.setLineDash([3,5]);
    ctx.beginPath();
    ctx.moveTo(cx(E2.x), yBracket);
    ctx.lineTo(cx(E3.x), yBracket);
    ctx.stroke(); ctx.setLineDash([]);
    // arrowhead pointing RIGHT — IE dominates to the right
    ctx.fillStyle='#5a0000';
    ctx.beginPath();
    ctx.moveTo(cx(E3.x),   yBracket);
    ctx.lineTo(cx(E3.x)-9, yBracket-5);
    ctx.lineTo(cx(E3.x)-9, yBracket+5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=RED; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('⚡ IE dominates — blasts right past E₁', cx((E2.x+E3.x)/2), yBracket+16);
    ctx.restore();
  }

  // IC2 = 2/(x-3), E3, IE arrow
  if(D.ie||D.total){
    drawShiftedNeg(2, 3, 3.1, 10, PURPLE, 2.5, 1);
    ctx.fillStyle=PURPLE; ctx.font='bold 12px Space Mono'; ctx.textAlign='left';
    ctx.fillText('I₂', cx(9.2), cy(2/6.2)-4);
    drop(E3.x,E3.y);
    pt(E3.x,E3.y,PURPLE,'E₃','br');
    arrow(E2.x,E2.y, E3.x,E3.y, PURPLE,'IE', 0,16);
  }

  // Total bars
  if(D.total){
    const y1b=cy(0)+20, y2b=cy(0)+38, y3b=cy(0)+58;

    // SE bar E2→E1 (leftward, green)
    ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y1b); ctx.lineTo(cx(E1.x),y1b); ctx.stroke();
    ctx.fillStyle='#1a3a1a';
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y1b); ctx.lineTo(cx(E2.x)-10,y1b-4); ctx.lineTo(cx(E2.x)-10,y1b+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5a9a5a'; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('SE ↓X', cx((E1.x+E2.x)/2), y1b+13);

    // IE bar E2→E3 rightward (dominates, red)
    ctx.strokeStyle='#5a0000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y2b); ctx.lineTo(cx(E3.x),y2b); ctx.stroke();
    ctx.fillStyle='#5a0000';
    ctx.beginPath(); ctx.moveTo(cx(E3.x),y2b); ctx.lineTo(cx(E3.x)+10,y2b-4); ctx.lineTo(cx(E3.x)+10,y2b+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle=RED; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('IE ↑↑X (dominates!)', cx((E2.x+E3.x)/2), y2b+13);

    // NET bar E1→E3 (rightward, red — demand ROSE)
    ctx.strokeStyle=RED; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx(E1.x),y3b); ctx.lineTo(cx(E3.x),y3b); ctx.stroke();
    ctx.fillStyle=RED;
    [[cx(E1.x),-1],[cx(E3.x),1]].forEach(([bx,dir])=>{
      ctx.beginPath(); ctx.moveTo(bx,y3b); ctx.lineTo(bx+dir*10,y3b-4); ctx.lineTo(bx+dir*10,y3b+4); ctx.closePath(); ctx.fill();
    });
    ctx.fillStyle=RED; ctx.font='bold 11px DM Sans'; ctx.textAlign='center';
    ctx.fillText('NET ↑X demand  (IE wins!)', cx((E1.x+E3.x)/2), y3b+15);
  }

  // E1 always on top
  if(D.e1||D.comp||D.se||D.tug||D.ie||D.total)
    pt(E1.x,E1.y,TEAL,'E₁','tr');
}

// ── ANIMATION ENGINE ──────────────────────────────────────
function animate(target,key,dur=750){
  if(aid) cancelAnimationFrame(aid);
  const t0=performance.now();
  (function tick(now){
    const p=ease(Math.min((now-t0)/dur,1));
    render(target,p);
    p<1 ? aid=requestAnimationFrame(tick) : (D[key]=true, render(null,1));
  })(t0);
}

// ── STEPS ─────────────────────────────────────────────────
const STEPS=[
  {t:'Draw the axes',
   x:'<strong>Good X</strong> on the horizontal axis, <strong>Good Y</strong> on the vertical. Good X is a <em>Giffen good</em>. The price is about to <strong>rise</strong> — and somehow, demand will <strong>rise too</strong>. The demand curve slopes upward.',
   fn:()=>axes()},

  {t:'Draw both budget lines — leave space',
   x:'<strong>B₁</strong> slope −1 (X cheap). Price rises — <strong>B₂</strong> slope −2. The SE will push E₂ far left — but the IE will blast E₃ back rightward <em>past E₁</em>. You need that space on the right.',
   fn:()=>animate('bl','bl',950)},

  {t:'Draw I₁ — placed HIGH on B₁',
   x:'Place I₁ so <strong>E₁ sits high on B₁</strong> — toward the y-axis, small x. This is deliberate. E₃ must land to the <em>right</em> of E₁, so you need space on the right side of the diagram. If E₁ is too far right, there is no room.',
   fn:()=>animate('ic1','ic1',900)},

  {t:'Mark E₁ — starting equilibrium',
   x:'B₁ just touches I₁ at E₁=(3,7) — high on the budget line. MRS = price ratio (both = 1). Consumer is optimally allocated before the price rise.',
   formula:'MUₓ / Pₓ  =  MUᵧ / Pᵧ',
   fn:()=>{ D.e1=true; render(null,1); }},

  {t:'Slide in the compensated budget line',
   x:'A line <em>parallel to B₂</em> (slope −2) slides outward until it just touches I₁. Tangency is <strong>E₂</strong> — well to the left of E₁, high on the diagram. The comp line has the exact same slope as B₂.',
   fn:()=>animate('comp','comp',750)},

  {t:'Substitution Effect: E₁ → E₂',
   x:'X is now dearer — consumer substitutes <em>away from X</em>. E₂ is far left of E₁. <strong>The SE is always normal — always moves away from the dearer good. The Giffen paradox lives entirely in the IE.</strong>',
   badge:'se',
   fn:()=>{ D.se=true; render(null,1); }},

  {t:'⚡ The IE is about to dominate everything',
   x:'Price rise made the consumer <em>poorer</em>. X is a Giffen good — an extreme inferior good. Getting poorer means <em>massively increasing</em> consumption of X. Think subsistence rice: you are so poor that when rice gets expensive, you can afford even less meat, so you eat <strong>even more</strong> rice. The IE will blast E₃ far to the right, <strong>past E₁</strong>.',
   badge:'tug',
   fn:()=>{ D.tug=true; render(null,1); }},

  {t:'Income Effect: E₂ → E₃  (IE dominates)',
   x:'The consumer drops to lower curve I₂ on B₂ — and the IE explodes X demand upward. E₃ lands <strong>to the RIGHT of E₁</strong>. <em>This is the Giffen paradox.</em> The sandwich: <strong>E₂ &lt; E₁ &lt; E₃</strong>. The IE completely overwhelms the SE.',
   badge:'ie',
   fn:()=>{ D.ie=true; render(null,1); }},

  {t:'Total Effect — income effect wins. Demand RISES.',
   x:'Price rose. Demand rose. The demand curve slopes <strong>upward</strong>. SE pushed X left, IE blasted it right past the start. Net: <em>more X purchased than before the price rose</em>. The red bars tell the story — IE dominates completely. This is why Giffen goods are so theoretically fascinating and empirically rare.',
   badge:'total',
   fn:()=>{ D.total=true; render(null,1); }}
];

// ── PANEL ─────────────────────────────────────────────────
function panel(){
  const s=STEPS[step];
  document.getElementById('sLabel').textContent=`Step ${step+1} of ${STEPS.length}`;
  document.getElementById('sTitle').textContent=s.t;
  let h=`<p>${s.x}</p>`;
  if(s.formula) h+=`<div class="formula">${s.formula}</div>`;
  if(s.badge){
    const map={
      se:   '<span class="badge b-se">E₁→E₂  Substitution ↓X (normal)</span>',
      tug:  '<span class="badge b-tug">⚡ IE about to overwhelm SE completely</span>',
      ie:   '<span class="badge b-ie">E₂→E₃  Income ↑↑X  (dominates!)</span>',
      total:'<span class="badge b-se">SE ↓X</span> <span class="badge b-ie">IE ↑↑X</span> <span class="badge b-warn">NET ↑ Demand · GIFFEN PARADOX</span>'
    };
    h+=`<div class="badges">${map[s.badge]}</div>`;
  }
  document.getElementById('sText').innerHTML=h;
  const pg=document.getElementById('prog'); pg.innerHTML='';
  STEPS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<step?' done':'')+(i===step?' active':'');
    pg.appendChild(d);
  });
  const btn=document.getElementById('btnNext');
  btn.disabled=step>=STEPS.length-1;
  btn.textContent=step>=STEPS.length-1?'✓ Complete':'Next →';
}

function doNext(){
  if(step>=STEPS.length-1) return;
  step++; panel(); STEPS[step].fn();
}

function doReset(){
  step=0;
  D={bl:false,ic1:false,e1:false,comp:false,se:false,tug:false,ie:false,total:false};
  if(aid) cancelAnimationFrame(aid);
  ctx.clearRect(0,0,W,H); axes(); panel();
}

panel(); axes();
</script>
