  .btn-reset:hover { color:var(--text); border-color:#444; }

  @media(max-width:720px){ .container{flex-direction:column;} .header{flex-direction:column;gap:12px;text-align:center;} .header-right{text-align:center;} }

<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W=490, H=490, M=62, PLOT=W-M-22;

const GOLD='#C9A84C', GOLDL='#E2C270', TEAL='#4ecdc4', GREEN='#6dbf6d', PURPLE='#b07fd4';

const cx = x => M + (x/11)*PLOT;
const cy = y => (H-M) - (y/11)*PLOT;
const ease = t => t<.5 ? 2*t*t : -1+(4-2*t)*t;

// ═══════════════════════════════════════════════════════════
// EXACT VERIFIED GEOMETRY — INFERIOR GOOD PRICE RISE
//
// Price of X RISES: Px1=1 → Px2=2
//
// B1: x+y=10    (0,10)→(10,0)  slope=-1  FLAT  (original, X was cheap)
// B2: 2x+y=10   (0,10)→(5,0)   slope=-2  STEEP (after rise, X expensive)
//
// IC1 = y = 25/x   (smooth hyperbola, U=xy=25)
//   Tangent to B1 at E1: MRS=y/x=1 → y=x → x²=25 → x=5, y=5
//   E1=(5,5) on B1: 5+5=10 ✓
//
// Comp: slope=-2 (parallel to B2), tangent to IC1:
//   MRS=y/x=2 → y=2x → 2x²=25 → x=√12.5≈3.536, y≈7.071
//   E2=(3.536, 7.071)
//   comp line: y=-2x+14.142   from (2.071,10)→(7.071,0)
//   [y-intercept 14.14 off canvas, clipped at top y=10]
//
// IC2 = y = 2/(x-3)   (smooth shifted hyperbola)
//   Tangent to B2 (slope -2) at E3:
//   dy/dx = -2/(x-3)² = -2 → (x-3)²=1 → x=4, y=2/(4-3)=2
//   E3=(4,2) on B2: 2*4+2=10 ✓, slope=-2 ✓
//   IC2 < IC1 everywhere (lower utility — price rose) ✓
//
// INFERIOR GOOD ORDER: E2.x(3.536) < E3.x(4) < E1.x(5) ✓
//   SE: E1→E2 moves LEFT  (X dearer → substitute away from X)
//   IE: E2→E3 moves RIGHT (poorer → inferior good → buy MORE of it)
//   Net: X demand falls — SE wins
// ═══════════════════════════════════════════════════════════

const E1 = {x: 5,             y: 5            };
const E2 = {x: Math.sqrt(12.5), y: 2*Math.sqrt(12.5) }; // ≈ (3.536, 7.071)
const E3 = {x: 4,             y: 2            };

// Comp line: y = -2x + 14.142  clipped to canvas (y<=10)
// At y=10: x=(14.142-10)/2=2.071
const COMP_XSTART = (2*E2.x + E2.y - 10) / 2;  // x where comp hits y=10
const COMP_XEND   = (2*E2.x + E2.y) / 2;        // x where comp hits y=0 = 7.071

let step=0, aid=null;
let D={bl:false,ic1:false,e1:false,comp:false,se:false,tug:false,ie:false,total:false};

// ── AXES ─────────────────────────────────────────────────
function axes(){
  ctx.strokeStyle='#111'; ctx.lineWidth=0.5;
  for(let i=1;i<=10;i++){
    ctx.beginPath(); ctx.moveTo(cx(i),H-M); ctx.lineTo(cx(i),M-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(M,cy(i)); ctx.lineTo(W-18,cy(i)); ctx.stroke();
  }
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(M,H-M); ctx.lineTo(W-14,H-M); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(M,H-M); ctx.lineTo(M,14); ctx.stroke();
  ctx.fillStyle='#2a2a2a';
  [[W-14,H-M,W-20,H-M-4,W-20,H-M+4],[M,14,M-4,20,M+4,20]].forEach(([ax,ay,bx,by,ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.lineTo(ex,ey); ctx.closePath(); ctx.fill();
  });
  ctx.fillStyle='#444'; ctx.font='13px DM Sans'; ctx.textAlign='center';
  ctx.fillText('Good X', W/2+10, H-8);
  ctx.save(); ctx.translate(13,H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('Good Y',0,0); ctx.restore();
  ctx.fillStyle='#333'; ctx.font='11px Space Mono'; ctx.textAlign='right';
  ctx.fillText('O',M-6,H-M+14);
}

// ── STRAIGHT SEGMENT (animated) ──────────────────────────
function seg(x0,y0,x1,y1,col,dash,w,p){
  const ex=x0+(x1-x0)*p, ey=y0+(y1-y0)*p;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash(dash);
  ctx.beginPath(); ctx.moveTo(cx(x0),cy(y0)); ctx.lineTo(cx(ex),cy(ey)); ctx.stroke();
  ctx.setLineDash([]);
}

// ── HYPERBOLA y=k/x (animated) ───────────────────────────
function drawHyperbola(k, xStart, xEnd, col, w, p){
  const drawX = xStart + (xEnd-xStart)*p;
  const steps=120;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash([]);
  ctx.beginPath();
  let first=true;
  for(let i=0;i<=steps;i++){
    const x = xStart + (drawX-xStart)*i/steps;
    const y = k/x;
    if(y<0.05||y>10.5) continue;
    first ? ctx.moveTo(cx(x),cy(y)) : ctx.lineTo(cx(x),cy(y));
    first=false;
  }
  ctx.stroke();
}

// ── SHIFTED HYPERBOLA y=k/(x-c) (animated) ───────────────
function drawShiftedHyperbola(k, c, xStart, xEnd, col, w, p){
  // y = k/(x - c),  c>0 means asymptote at x=c, draw for x > c
  const drawX = xStart + (xEnd-xStart)*p;
  const steps=120;
  ctx.strokeStyle=col; ctx.lineWidth=w; ctx.setLineDash([]);
  ctx.beginPath();
  let first=true;
  for(let i=0;i<=steps;i++){
    const x = xStart + (drawX-xStart)*i/steps;
    if(x<=c+0.05) continue;
    const y = k/(x-c);
    if(y<0.05||y>10.5) continue;
    first ? ctx.moveTo(cx(x),cy(y)) : ctx.lineTo(cx(x),cy(y));
    first=false;
  }
  ctx.stroke();
}

// ── BUDGET LINES ─────────────────────────────────────────
function bl(p=1){
  // B1: x+y=10  (0,10)→(10,0)  slope -1  FLAT
  seg(0,10, 10,0, TEAL,[],2.5, p);
  // B2: 2x+y=10 (0,10)→(5,0)  slope -2  STEEP
  if(p>=0.5) seg(0,10, 5,0, GOLD,[],2.5, (p-.5)/.5);
  if(p===1){
    ctx.font='bold 13px Space Mono'; ctx.textAlign='left';
    ctx.fillStyle=TEAL; ctx.fillText('B₁', cx(10)+5, cy(0)+4);
    ctx.fillStyle=GOLD; ctx.fillText('B₂', cx(5)+5,  cy(0)+4);
    ctx.fillStyle='#253535'; ctx.font='10px DM Sans';
    ctx.fillText('slope −1', cx(7.5), cy(2.8)-10);
    ctx.fillStyle='#3a2e00';
    ctx.fillText('slope −2', cx(1.0), cy(8)+16);
    ctx.fillStyle='#222'; ctx.textAlign='left';
    ctx.fillText('← same Y-intercept', cx(0)+8, cy(10)-10);
  }
}

// ── DROP LINES ────────────────────────────────────────────
function drop(x,y){
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(cx(x),cy(y)); ctx.lineTo(cx(x),cy(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx(x),cy(y)); ctx.lineTo(cx(0),cy(y)); ctx.stroke();
  ctx.setLineDash([]);
}

// ── POINT ─────────────────────────────────────────────────
function pt(x,y,col,lbl,pos){
  ctx.beginPath(); ctx.arc(cx(x),cy(y),5.5,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 13px Space Mono';
  const o=11;
  const P={tr:[o,-o+4,'left'],tl:[-o,-o+4,'right'],br:[o,o+12,'left'],bl:[-o,o+12,'right']};
  const [dx,dy,ta]=P[pos||'tr'];
  ctx.textAlign=ta; ctx.fillText(lbl,cx(x)+dx,cy(y)+dy);
}

// ── COMPENSATED LINE ──────────────────────────────────────
// y=-2x+14.142  slope=-2, parallel to B2
// Clipped to canvas: from (2.071,10) to (7.071,0)
function comp(p=1){
  seg(COMP_XSTART,10, COMP_XEND,0, GOLDL,[7,4],1.8, p);
  if(p===1){
    ctx.fillStyle=GOLDL; ctx.font='10px DM Sans'; ctx.textAlign='left';
    ctx.fillText('compensated (slope −2)', cx(4.8), cy(4.3)+14);
  }
}

// ── ARROW ─────────────────────────────────────────────────
function arrow(x1,y1,x2,y2,col,lbl,ox,oy){
  const ang=Math.atan2(cy(y2)-cy(y1), cx(x2)-cx(x1));
  ctx.strokeStyle=col; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(cx(x1),cy(y1)); ctx.lineTo(cx(x2),cy(y2)); ctx.stroke();
  ctx.save(); ctx.translate(cx(x2),cy(y2)); ctx.rotate(ang);
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-11,-5); ctx.lineTo(-11,5); ctx.closePath(); ctx.fill();
  ctx.restore();
  ctx.fillStyle=col; ctx.font='bold 11px DM Sans'; ctx.textAlign='center';
  ctx.fillText(lbl, (cx(x1)+cx(x2))/2+(ox||0), (cy(y1)+cy(y2))/2+(oy||0));
}

// ── RENDER ────────────────────────────────────────────────
function render(at, ap){
  ctx.clearRect(0,0,W,H);
  axes();

  if(D.bl||at==='bl') bl(D.bl?1:ap);

  // IC1 = y=25/x — smooth hyperbola
  if(D.ic1||at==='ic1'){
    drawHyperbola(25, 1.0, 10, TEAL, 2.5, D.ic1?1:ap);
    if(D.ic1){
      ctx.fillStyle=TEAL; ctx.font='bold 12px Space Mono'; ctx.textAlign='left';
      ctx.fillText('I₁', cx(9.2), cy(25/9.2)-4);
    }
  }

  // E1 — right side of diagram (X was affordable, consumer bought lots)
  if(D.e1||D.comp||D.se||D.tug||D.ie||D.total){
    drop(E1.x,E1.y); pt(E1.x,E1.y,TEAL,'E₁','tr');
  }

  // Compensated line — slope -2, parallel to B2, above IC1 tangent at E2
  if(D.comp||D.se||D.tug||D.ie||D.total) comp(1);
  else if(at==='comp') comp(ap);

  // E2 — upper-left (SE overshoots left)
  if(D.comp||D.se||D.tug||D.ie||D.total){
    drop(E2.x,E2.y); pt(E2.x,E2.y,GOLDL,'E₂','tl');
  }

  // SE arrow E1→E2 (leftward — X is dearer)
  if(D.se||D.tug||D.ie||D.total)
    arrow(E1.x,E1.y, E2.x,E2.y, GREEN,'SE', 0,-16);

  // Tug of war annotation
  if(D.tug||D.ie||D.total){
    ctx.save();
    const yBracket = cy(Math.min(E2.y,E3.y)) + 36;
    ctx.strokeStyle='#3a2200'; ctx.lineWidth=1.5; ctx.setLineDash([3,5]);
    ctx.beginPath();
    ctx.moveTo(cx(E2.x), yBracket);
    ctx.lineTo(cx(E3.x), yBracket);
    ctx.stroke(); ctx.setLineDash([]);
    // arrowhead pointing RIGHT toward E3
    ctx.fillStyle='#3a2200';
    ctx.beginPath();
    ctx.moveTo(cx(E3.x),   yBracket);
    ctx.lineTo(cx(E3.x)-9, yBracket-5);
    ctx.lineTo(cx(E3.x)-9, yBracket+5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#7a5010'; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('⚡ IE pulls back right', cx((E2.x+E3.x)/2), yBracket+16);
    ctx.restore();
  }

  // IC2 = y=2/(x-3) — smooth shifted hyperbola, draw from x=3.2
  // E3=(4,2), tangent slope=-2 ✓, IC2 < IC1 (lower utility) ✓
  if(D.ie||D.total){
    drawShiftedHyperbola(2, 3, 3.15, 10, PURPLE, 2.5, 1);
    ctx.fillStyle=PURPLE; ctx.font='bold 12px Space Mono'; ctx.textAlign='left';
    ctx.fillText('I₂', cx(9.2), cy(2/(9.2-3))-4);
    drop(E3.x,E3.y);
    pt(E3.x,E3.y,PURPLE,'E₃','br');
    arrow(E2.x,E2.y, E3.x,E3.y, PURPLE,'IE', 0,16);
  }

  // Total — three stacked x-axis bars
  if(D.total){
    const y1b=cy(0)+20, y2b=cy(0)+38, y3b=cy(0)+58;

    // SE bar E1→E2 (leftward)
    ctx.strokeStyle='#1a3a1a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y1b); ctx.lineTo(cx(E1.x),y1b); ctx.stroke();
    ctx.fillStyle='#1a3a1a';
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y1b); ctx.lineTo(cx(E2.x)-10,y1b-4); ctx.lineTo(cx(E2.x)-10,y1b+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#5a9a5a'; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('SE ↓X', cx((E1.x+E2.x)/2), y1b+13);

    // IE bar E2→E3 (rightward — partially offsets)
    ctx.strokeStyle='#2d1a3a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx(E2.x),y2b); ctx.lineTo(cx(E3.x),y2b); ctx.stroke();
    ctx.fillStyle='#2d1a3a';
    ctx.beginPath(); ctx.moveTo(cx(E3.x),y2b); ctx.lineTo(cx(E3.x)+10,y2b-4); ctx.lineTo(cx(E3.x)+10,y2b+4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#7a4aaa'; ctx.font='bold 10px DM Sans'; ctx.textAlign='center';
    ctx.fillText('IE ↑X (inferior)', cx((E2.x+E3.x)/2), y2b+13);

    // NET bar E3→E1 (gold — demand still fell)
    ctx.strokeStyle=GOLD; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx(E3.x),y3b); ctx.lineTo(cx(E1.x),y3b); ctx.stroke();
    ctx.fillStyle=GOLD;
    [[cx(E3.x),-1],[cx(E1.x),1]].forEach(([bx,dir])=>{
      ctx.beginPath(); ctx.moveTo(bx,y3b); ctx.lineTo(bx+dir*10,y3b-4); ctx.lineTo(bx+dir*10,y3b+4); ctx.closePath(); ctx.fill();
    });
    ctx.fillStyle=GOLD; ctx.font='bold 11px DM Sans'; ctx.textAlign='center';
    ctx.fillText('NET ↓X demand  (SE wins)', cx((E1.x+E3.x)/2), y3b+15);
  }

  // E1 always on top
  if(D.e1||D.comp||D.se||D.tug||D.ie||D.total)
    pt(E1.x,E1.y,TEAL,'E₁','tr');
}

// ── ANIMATION ENGINE ──────────────────────────────────────
function animate(target,key,dur=750){
  if(aid) cancelAnimationFrame(aid);
  const t0=performance.now();
  (function tick(now){
    const p=ease(Math.min((now-t0)/dur,1));
    render(target,p);
    p<1 ? aid=requestAnimationFrame(tick) : (D[key]=true, render(null,1));
  })(t0);
}

// ── STEPS ─────────────────────────────────────────────────
const STEPS=[
  {t:'Draw the axes',
   x:'<strong>Good X</strong> on the horizontal axis, <strong>Good Y</strong> on the vertical. Good X is our <em>inferior good</em>. The price of X is about to <strong>rise</strong> — the budget line will rotate inward.',
   fn:()=>axes()},

  {t:'Draw both budget lines — leave space',
   x:'<strong>B₁</strong> has slope −1 (X was cheap). Price rises — <strong>B₂</strong> has slope −2. B₁ is flat and wide, B₂ is steep and short. Notice the <em>angular gap</em>. The SE will overshoot far left to E₂, then the IE pulls E₃ back right. You need space for that story.',
   fn:()=>animate('bl','bl',950)},

  {t:'Draw I₁ — the smooth hyperbola',
   x:'I₁ is a smooth convex hyperbola. It is tangent to <strong>B₁ at E₁</strong> (slope −1). E₁ sits <em>right of centre</em> — the consumer was buying plenty of X when it was cheap. The curve sweeps from upper-left to lower-right.',
   fn:()=>animate('ic1','ic1',900)},

  {t:'Mark E₁ — starting equilibrium',
   x:'B₁ just touches I₁ at E₁=(5,5). MRS = price ratio (both equal 1). Consumer is optimally allocated on the original budget before the price rise.',
   formula:'MUₓ / Pₓ  =  MUᵧ / Pᵧ',
   fn:()=>{ D.e1=true; render(null,1); }},

  {t:'Slide in the compensated budget line',
   x:'A line <em>parallel to B₂</em> (slope −2) slides outward until it just touches I₁. Tangency point is <strong>E₂</strong> — upper-left of E₁. The comp line has the <strong>exact same slope as B₂</strong> and lies entirely <em>above</em> I₁, touching only at E₂.',
   fn:()=>animate('comp','comp',750)},

  {t:'Substitution Effect: E₁ → E₂',
   x:'X is now dearer — consumer substitutes <em>away from X</em>. E₂ is well to the left of E₁. <strong>SE always moves in the direction of the price change. No exceptions.</strong> Movement along I₁ — same utility, new price ratio.',
   badge:'se',
   fn:()=>{ D.se=true; render(null,1); }},

  {t:'⚡ The Tug of War',
   x:'The price rise made the consumer <em>poorer</em> in real terms. For a normal good: less wealth → buy even less X. But X is <em>inferior</em> — getting poorer means downgrading <strong>toward</strong> it. Think switching from craft beer back to the value supermarket lager. The IE is about to <strong>pull E₃ back right</strong>, fighting the SE.',
   badge:'tug',
   fn:()=>{ D.tug=true; render(null,1); }},

  {t:'Income Effect: E₂ → E₃',
   x:'Consumer drops to lower curve I₂ on B₂. The IE <em>increases</em> X for an inferior good. E₃ lands <em>right</em> of E₂ — but still left of E₁. <strong>The sandwich: E₂ &lt; E₃ &lt; E₁ on the x-axis.</strong> I₂ is tangent to B₂ at E₃ with slope −2. If E₃ is not between E₂ and E₁, the diagram is wrong.',
   badge:'ie',
   fn:()=>{ D.ie=true; render(null,1); }},

  {t:'Total Effect — substitution effect wins',
   x:'E₃ is still left of E₁ — net demand fell. SE pushed X left, IE pushed back right, SE was larger. <strong>Demand still slopes downward for inferior goods</strong> — the positive IE only partially offsets the SE. See the three bars showing the tug of war.',
   badge:'total',
   fn:()=>{ D.total=true; render(null,1); }}
];

// ── PANEL ─────────────────────────────────────────────────
function panel(){
  const s=STEPS[step];
  document.getElementById('sLabel').textContent=`Step ${step+1} of ${STEPS.length}`;
  document.getElementById('sTitle').textContent=s.t;
  let h=`<p>${s.x}</p>`;
  if(s.formula) h+=`<div class="formula">${s.formula}</div>`;
  if(s.badge){
    const map={
      se:   '<span class="badge b-se">E₁→E₂  Substitution ↓X</span>',
      tug:  '<span class="badge b-tug">⚡ SE pulled left · IE will pull right</span>',
      ie:   '<span class="badge b-ie">E₂→E₃  Income ↑X  (inferior!)</span>',
      total:'<span class="badge b-se">SE ↓X</span> <span class="badge b-ie">IE ↑X</span> <span class="badge b-tot">NET ↓ Demand · SE wins</span>'
    };
    h+=`<div class="badges">${map[s.badge]}</div>`;
  }
  document.getElementById('sText').innerHTML=h;
  const pg=document.getElementById('prog'); pg.innerHTML='';
  STEPS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<step?' done':'')+(i===step?' active':'');
    pg.appendChild(d);
  });
  const btn=document.getElementById('btnNext');
  btn.disabled=step>=STEPS.length-1;
  btn.textContent=step>=STEPS.length-1?'✓ Complete':'Next →';
}

function doNext(){
  if(step>=STEPS.length-1) return;
  step++; panel(); STEPS[step].fn();
}

function doReset(){
  step=0;
  D={bl:false,ic1:false,e1:false,comp:false,se:false,tug:false,ie:false,total:false};
  if(aid) cancelAnimationFrame(aid);
  ctx.clearRect(0,0,W,H); axes(); panel();
}

panel(); axes();
</script>
